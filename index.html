<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isotope Builder Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #313244;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 400px;
        }
        canvas {
            background-color: #181825;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .protons-label { color: #f38ba8; }
        .neutrons-label { color: #89b4fa; }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        h2 { margin: 10px 0 5px 0; color: #f5e0dc; }
        h3 { margin: 0 0 20px 0; font-weight: normal; color: #a6adc8; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="nucleusCanvas" width="200" height="200"></canvas>
    
    <h2 id="elementName">Carbon</h2>
    <h3 id="isotopeName">Carbon-12</h3>

    <div class="controls">
        <div class="slider-group">
            <label class="protons-label" for="protons">Protons (Element ID): <span id="protonsVal">6</span></label>
            <input type="range" id="protons" min="1" max="10" value="6">
        </div>
        <div class="slider-group">
            <label class="neutrons-label" for="neutrons">Neutrons (Isotope Mass): <span id="neutronsVal">6</span></label>
            <input type="range" id="neutrons" min="1" max="14" value="6">
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('nucleusCanvas');
    const ctx = canvas.getContext('2d');
    const protonsSlider = document.getElementById('protons');
    const neutronsSlider = document.getElementById('neutrons');
    const protonsVal = document.getElementById('protonsVal');
    const neutronsVal = document.getElementById('neutronsVal');
    const elementName = document.getElementById('elementName');
    const isotopeName = document.getElementById('isotopeName');

    // dictionary for the first 10 elements
    const elements = {
        1: "Hydrogen", 2: "Helium", 3: "Lithium", 4: "Beryllium",
        5: "Boron", 6: "Carbon", 7: "Nitrogen", 8: "Oxygen",
        9: "Fluorine", 10: "Neon"
    };

    function drawNucleus(pCount, nCount) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 10;
        const particles = [];

        const total = pCount + nCount;
        const golden_ratio = (Math.sqrt(5) + 1) / 2;
        
        const types = Array(pCount).fill(true).concat(Array(nCount).fill(false));
        
        // shuffle particles to mix protons and neutrons naturally
        for (let i = types.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [types[i], types[j]] = [types[j], types[i]];
        }

        // calculate positions using a Fibonacci spiral for clustering
        for (let i = 0; i < total; i++) {
            const theta = 2 * Math.PI * i / golden_ratio;
            const r = Math.sqrt(i) * 11; 
            
            const x = centerX + r * Math.cos(theta);
            const y = centerY + r * Math.sin(theta);
            
            particles.push({ x, y, isProton: types[i] });
        }

        // draw each particle
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = p.isProton ? '#f38ba8' : '#89b4fa';
            ctx.fill();
            
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#11111b';
            ctx.stroke();
            
            // highlight for 3D effect
            ctx.beginPath();
            ctx.arc(p.x - 3, p.y - 3, radius / 3, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
        });
    }

    function update() {
        const p = parseInt(protonsSlider.value);
        const n = parseInt(neutronsSlider.value);
        
        protonsVal.innerText = p;
        neutronsVal.innerText = n;
        
        const name = elements[p];
        const mass = p + n;
        
        elementName.innerText = name;
        isotopeName.innerText = `${name}-${mass}`;
        
        drawNucleus(p, n);
    }

    protonsSlider.addEventListener('input', update);
    neutronsSlider.addEventListener('input', update);

    update();
</script>

</body>
</html>
